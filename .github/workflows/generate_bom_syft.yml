name: Syft SBOM Runner

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - opened

concurrency:
  group: dtrack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generatebom:
    runs-on: bom
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Read node version (fallback 20)
        run: |
          if [ -f .nvmrc ]; then
            echo "NODE_VERSION=$(tr -d 'v' < .nvmrc)" >> "$GITHUB_ENV"
          else
            echo "NODE_VERSION=20" >> "$GITHUB_ENV"
          fi

      - name: Yarn install + SBOM (container)
        run: |
          podman run --rm \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            node:${NODE_VERSION}-bullseye \
            bash -lc '
              set -e
              corepack enable
              yarn install

              # Install syft in the container
              curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
                | sh -s -- -b /usr/local/bin

              # Generate CycloneDX JSON SBOM
              syft . -o cyclonedx-json=bom_syft.json
            '

      - name: Upload BOM, analyze, and fetch metrics
        id: dtrack_syft
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          scripts/upload_bom_and_fetch_metrics.sh \
            --bom-file bom_syft.json \
            --project-suffix syft

      - name: Export SARIF findings (syft)
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          PROJECT_UUID: ${{ steps.dtrack_syft.outputs.project_uuid }}
        run: |
          set -euo pipefail

          curl -sSf "$DTRACK_URL/api/v1/finding/project/$PROJECT_UUID?suppressed=false" \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -H "Accept: application/sarif+json" \
            -o dtrack-syft.sarif

          test -s dtrack-syft.sarif || { echo "::error::dtrack-syft.sarif is missing or empty"; exit 1; }
          jq -e '.runs and (.runs | type == "array")' dtrack-syft.sarif >/dev/null

      - name: Export VEX and VDR JSON for SARIF mapping (syft)
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          PROJECT_UUID: ${{ steps.dtrack_syft.outputs.project_uuid }}
        run: |
          set -euo pipefail

          curl -sSf "$DTRACK_URL/api/v1/vex/cyclonedx/project/$PROJECT_UUID" \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -o vex_syft.json

          curl -sSf "$DTRACK_URL/api/v1/bom/cyclonedx/project/$PROJECT_UUID?variant=vdr&format=JSON" \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -o vdr_syft.json

          test -s vex_syft.json || { echo "::error::vex_syft.json is missing or empty"; exit 1; }
          test -s vdr_syft.json || { echo "::error::vdr_syft.json is missing or empty"; exit 1; }

      - name: Normalize SARIF for GitHub Code Scanning (syft)
        run: |
          set -euo pipefail

          python3 scripts/normalize_sarif.py \
            --input-sarif dtrack-syft.sarif \
            --output-sarif dtrack-syft.sarif \
            --vdr vdr_syft.json \
            --vex vex_syft.json \
            --source syft-test \
            --tool-name "OWASP Dependency-Track (syft-test)" \
            --rule-id-namespace "syft-test::" \
            --location-mode fallback \
            --fallback-uri bom.json \
            --fallback-line 1

          jq -e '.runs[0].results[0].locations[0].physicalLocation.artifactLocation.uri' dtrack-syft.sarif >/dev/null

      - name: Debug normalized SARIF identity (syft)
        run: |
          set -euo pipefail
          echo "Tool name:"
          jq -r '.runs[0].tool.driver.name' dtrack-syft.sarif
          echo "First 5 rule IDs:"
          jq -r '.runs[0].results[0:5][] | .ruleId' dtrack-syft.sarif

      - name: Estimate introduced candidates from SARIF vs base (syft)
        id: introduced_candidates_syft
        env:
          GH_TOKEN: ${{ github.token }}
          TOOL_NAME: OWASP Dependency-Track (syft-test)
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          python3 scripts/estimate_introduced_candidates_from_sarif.py \
            --sarif dtrack-syft.sarif \
            --repo "$GITHUB_REPOSITORY" \
            --tool-name "$TOOL_NAME" \
            --base-branch "${BASE_REF:-${GITHUB_REF_NAME}}" \
            --out-dir "$RUNNER_TEMP" \
            --prefix "dtrack_syft"

      - name: Upload SARIF to GitHub Code Scanning (syft)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dtrack-syft.sarif
          category: dependency-track-syft-test

      - name: Report code scanning summary (syft)
        run: |
          set -euo pipefail

          introduced_critical="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_critical_count }}"
          introduced_high="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_high_count }}"
          introduced_medium="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_medium_count }}"
          introduced_low="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_low_count }}"
          introduced_unknown="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_unknown_count }}"
          introduced_total="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_all_count }}"
          sarif_total="${{ steps.introduced_candidates_syft.outputs.sarif_rule_ids_all_count }}"
          base_total="${{ steps.introduced_candidates_syft.outputs.base_rule_ids_all_count }}"
          baseline_missing="${{ steps.introduced_candidates_syft.outputs.baseline_missing }}"
          summary_file="${{ steps.introduced_candidates_syft.outputs.summary_file }}"
          branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          query="is:open branch:${branch_name} tool:\"OWASP Dependency-Track (syft-test)\""
          branch_url="https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=$(jq -rn --arg value "$query" '$value|@uri')"

          introduced_critical="${introduced_critical:-0}"
          introduced_high="${introduced_high:-0}"
          introduced_medium="${introduced_medium:-0}"
          introduced_low="${introduced_low:-0}"
          introduced_unknown="${introduced_unknown:-0}"
          introduced_total="${introduced_total:-0}"
          sarif_total="${sarif_total:-0}"
          base_total="${base_total:-0}"
          baseline_missing="${baseline_missing:-false}"
          summary_file="${summary_file:-}"

          echo "::notice::Syft introduced candidates vs base: critical=$introduced_critical high=$introduced_high total=$introduced_total baseline_missing=$baseline_missing"
          echo "### Syft code scanning" >> "$GITHUB_STEP_SUMMARY"
          echo "- SARIF rule IDs (all severities): $sarif_total" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base open rule IDs (all severities): $base_total" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates critical: $introduced_critical" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates high: $introduced_high" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates medium: $introduced_medium" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates low: $introduced_low" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates unknown: $introduced_unknown" >> "$GITHUB_STEP_SUMMARY"
          echo "- Introduced candidates total: $introduced_total" >> "$GITHUB_STEP_SUMMARY"
          echo "- Baseline missing (base has no open rule IDs): $baseline_missing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Summary JSON: ${summary_file:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch alerts URL: $branch_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce newly introduced vulnerability gate (critical/high)
        run: |
          set -euo pipefail

          crit="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_critical_count }}"
          high="${{ steps.introduced_candidates_syft.outputs.introduced_candidate_high_count }}"
          summary_file="${{ steps.introduced_candidates_syft.outputs.summary_file }}"
          branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          query="is:open branch:${branch_name} tool:\"OWASP Dependency-Track (syft-test)\""
          branch_url="https://github.com/${GITHUB_REPOSITORY}/security/code-scanning?query=$(jq -rn --arg value "$query" '$value|@uri')"

          crit="${crit:-0}"
          high="${high:-0}"

          new_crit_ids=""
          new_high_ids=""
          if [ -n "${summary_file:-}" ] && [ -f "$summary_file" ]; then
            new_crit_ids="$(jq -r '.introduced_candidate_by_severity.critical[]?' "$summary_file" | paste -sd, -)"
            new_high_ids="$(jq -r '.introduced_candidate_by_severity.high[]?' "$summary_file" | paste -sd, -)"
          fi

          echo "Final gate values (introduced candidates vs base): critical=[$crit] high=[$high]"

          if [ "$crit" -gt 0 ] || [ "$high" -gt 0 ]; then
            echo "Introduced critical rule IDs: ${new_crit_ids:-none}"
            echo "Introduced high rule IDs: ${new_high_ids:-none}"
            echo "::error::Found introduced critical/high rule IDs vs base (critical=$crit, high=$high). Review: $branch_url"
            exit 1
          fi

          echo "No introduced critical or high rule IDs vs base"
