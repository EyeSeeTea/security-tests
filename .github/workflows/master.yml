name: "Shared Master Workflow"

on:
  push:
    branches: ["master", "development"]
  pull_request:
    branches: ["master", "development"]
  workflow_dispatch:

jobs:
  dependency-track-syft:
    if: github.event_name == 'pull_request'
    uses: EyeSeeTea/github-workflows/.github/workflows/dependency-track-syft.yml@feature/add_bom_actions
    secrets: inherit

  dependency-track-yarn4:
    if: github.event_name == 'pull_request'
    uses: EyeSeeTea/github-workflows/.github/workflows/dependency-track-yarn4.yml@feature/add_bom_actions
    secrets: inherit