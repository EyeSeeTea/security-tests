name: "Shared Master Workflow"

on:
  push:
    branches: ["master", "development"]
  pull_request:
    branches: ["master", "development"]
  workflow_dispatch:

jobs:
  master-workflow:
    # While BOM workflows are in development, consume from this branch.
    uses: EyeSeeTea/github-workflows/.github/workflows/master.yml@feature/add_bom_actions
    secrets: inherit
    with:
      # Use "all" (default) or an explicit list including dependency-track-yarn4,dependency-track-syft.
      workflows_to_run: "dependency-track-yarn4,dependency-track-syft"